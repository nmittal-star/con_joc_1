
 <ng-template #namesTemplate>
    <div> 
     
       <div class="container">

    <h3 class="section-title"> File</h3>

    <eh-drop-area class="drop-area" [config]="dropSingleConfig" (filesDropped)="handleDrop($event)">
    </eh-drop-area>

    <div [formGroup]="repCheckForm" class="form-row">
        <eh-select [formGroup]="repCheckForm" [config]="selectConfig" formControlName="mode" class="select-small">
        </eh-select>
        <eh-textarea formControlName="note"  label="Note" [rows]="1"
            [maxLength]="10">
        </eh-textarea>
    </div>


</div>

    </div> 
   </ng-template> 





<eh-table [columns]="columns" [tableTitle]="'Reputation Check CSV'" [config]="sinchorderConfig"
    [dataSource$]="dataSources$" [paginationConfig]="paginationConfig" (pageChange)="onPageChange($event)"
    (sizeChange)="onPageSizeChange($event)" (sortChange)="onSortChange($event)" [extraButtons]="extraButtons">
</eh-table>
